name: Build Plugin Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine Plugin Slug
        id: plugin
        run: |
          SLUG=$(basename $GITHUB_REPOSITORY)
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Build Release Package
        run: |
          SLUG=${{ steps.plugin.outputs.slug }}

          mkdir -p release/$SLUG

          cp -R assets release/$SLUG/ 2>/dev/null || true
          cp -R includes release/$SLUG/ 2>/dev/null || true
          cp -R templates release/$SLUG/ 2>/dev/null || true

          [ -f myplugin.php ] && cp myplugin.php release/$SLUG/
          [ -f uninstall.php ] && cp uninstall.php release/$SLUG/
          [ -f README.md ] && cp README.md release/$SLUG/
          [ -f LICENSE ] && cp LICENSE release/$SLUG/

          cd release
          zip -r ../${SLUG}.zip $SLUG

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.plugin.outputs.slug }}.zip
          generate_release_notes: true